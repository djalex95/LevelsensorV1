name: Build & Release Firmware

# Bei jedem Push auf main die Firmware (.bin) bauen und an ein GitHub-Release
# hängen. Version kommt aus Core/Inc/version.h (FW_VERSION).
# Die Handy-App liegt in einem eigenen Repo mit eigener CI.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Firmware-Version ermitteln
        id: ver
        run: |
          fw=$(grep -oP '^#define\s+FW_VERSION\s+"\K[^"]+' Core/Inc/version.h | head -n1)
          echo "fw=$fw" >> "$GITHUB_OUTPUT"
          echo "Firmware-Version: $fw"

      - name: ARM-Toolchain installieren
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Firmware bauen
        run: make -j4

      - name: .bin mit Version benennen
        run: python3 tools/stamp_bin.py build/CAN_FuellstandsensorBLE.bin

      - name: Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.fw }}
          name: Firmware v${{ steps.ver.outputs.fw }}
          body: |
            Automatisch gebaut aus main.
            - Firmware: Fuellstandsensor_v${{ steps.ver.outputs.fw }}.bin (OTA-tauglich)
          files: dist/Fuellstandsensor_v*.bin
