name: fuellstand_app
description: BLE-App für den NMEA2000-Füllstandsensor (Würth Proteus-e)
publish_to: 'none'
version: 1.2.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.12
  permission_handler: ^11.3.1
  file_picker: ^8.1.2
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/

# App-Icon (Wassertank). Generieren mit:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1A84FF"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
